name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Ruff
        run: ruff check .

      - name: Compile Python files
        run: python3 -m py_compile app.py src/*.py launch.py

      - name: Run tests
        run: python3 -m pytest

      - name: Check dashboard app JavaScript
        run: node --check dashboard/app.js

      - name: Check dashboard project JavaScript
        run: node --check dashboard/project.js
